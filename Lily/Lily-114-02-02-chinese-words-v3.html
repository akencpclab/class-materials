<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>字音字形小試身手 - 挑錯大作戰 v3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
      font-family: 'PingFang TC','Heiti TC','Microsoft JhengHei',sans-serif;
    }
    @keyframes pop-in {
      0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1}
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)}
      40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
    }
    @keyframes star-fall {
      0%{transform:translateY(-60px) rotate(0deg);opacity:1}
      100%{transform:translateY(80px) rotate(720deg);opacity:0}
    }
    @keyframes reward-zoom-in {
      0%{transform:scale(0.1) rotate(-12deg);opacity:0}
      65%{transform:scale(1.08) rotate(2deg);opacity:1}
      82%{transform:scale(0.97) rotate(-1deg)}
      100%{transform:scale(1) rotate(0deg);opacity:1}
    }
    @keyframes reward-zoom-out {
      0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0}
    }
    @keyframes fireworks {
      0%{transform:scale(0);opacity:1} 50%{transform:scale(1.5);opacity:0.7} 100%{transform:scale(2.2);opacity:0}
    }
    @keyframes combo-pop {
      0%{transform:scale(0.5) rotate(-10deg);opacity:0}
      60%{transform:scale(1.2) rotate(4deg);opacity:1}
      100%{transform:scale(1) rotate(0deg);opacity:1}
    }
    .anim-pop   { animation: pop-in 0.4s ease forwards; }
    .anim-shake { animation: shake 0.5s ease; }
    .star       { position:absolute; font-size:1.8rem; animation:star-fall 0.9s ease forwards; pointer-events:none; }
    .reward-zoom-in  { animation: reward-zoom-in  0.45s cubic-bezier(.17,.67,.35,1.3) forwards; }
    .reward-zoom-out { animation: reward-zoom-out 0.3s ease forwards; }
    .reward-overlay {
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.78); backdrop-filter:blur(5px);
    }
    .reward-card {
      background:white; border-radius:2rem; padding:1.5rem;
      max-width:380px; width:88%; text-align:center;
      box-shadow:0 30px 70px rgba(0,0,0,0.45);
    }
    .reward-img {
      width:260px; height:260px; object-fit:cover;
      border-radius:1.2rem; border-width:5px; border-style:solid;
      margin:0 auto 0.75rem; display:block;
    }
    .firework {
      position:absolute; border-radius:50%;
      animation:fireworks 0.65s ease forwards;
    }
    .combo-badge { animation: combo-pop 0.35s ease forwards; }
    .progress-fill { transition: width 0.4s ease; }
    .next-btn { transition: transform 0.12s, box-shadow 0.12s; }
    .next-btn:active { transform: scale(0.96); }
  </style>
</head>

function getAudioCtx(ref) {
  if (!ref.current) ref.current = new (window.AudioContext || window.webkitAudioContext)();
  return ref.current;
}
function playCorrect(ctx) {
  const t = ctx.currentTime;
  [523.25,659.25,783.99,1046.50].forEach((freq,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=freq;
    g.gain.setValueAtTime(0,t+i*0.08);g.gain.linearRampToValueAtTime(0.35,t+i*0.08+0.04);g.gain.linearRampToValueAtTime(0,t+i*0.08+0.18);
    o.start(t+i*0.08);o.stop(t+i*0.08+0.2);
  });
}
function playWrong(ctx) {
  const t = ctx.currentTime;
  [220,196].forEach((freq,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type="sawtooth";o.frequency.value=freq;
    g.gain.setValueAtTime(0,t+i*0.22);g.gain.linearRampToValueAtTime(0.3,t+i*0.22+0.05);g.gain.linearRampToValueAtTime(0,t+i*0.22+0.22);
    o.start(t+i*0.22);o.stop(t+i*0.22+0.25);
  });
}
function playGun(ctx) {
  const t=ctx.currentTime;
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const src=ctx.createBufferSource();src.buffer=buf;
  const g=ctx.createGain();g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(g);g.connect(ctx.destination);src.start(t);
  const o=ctx.createOscillator(),g2=ctx.createGain();
  o.connect(g2);g2.connect(ctx.destination);o.type="sine";o.frequency.value=900;
  o.frequency.exponentialRampToValueAtTime(150,t+0.14);
  g2.gain.setValueAtTime(0.5,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.start(t);o.stop(t+0.16);
}
function playViolin(ctx) {
  const t=ctx.currentTime;
  [[440,0],[494,0.13],[523.25,0.26],[587.33,0.39],[659.25,0.52]].forEach(([f,d])=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    const vib=ctx.createOscillator(),vibG=ctx.createGain();
    vib.frequency.value=6;vibG.gain.value=6;
    vib.connect(vibG);vibG.connect(o.frequency);
    o.connect(g);g.connect(ctx.destination);o.type="sawtooth";o.frequency.value=f;
    g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.28,t+d+0.04);
    g.gain.exponentialRampToValueAtTime(0.001,t+d+0.38);
    o.start(t+d);vib.start(t+d);o.stop(t+d+0.4);vib.stop(t+d+0.4);
  });
}
function playPlane(ctx) {
  const t=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type="sawtooth";
  o.frequency.setValueAtTime(180,t);o.frequency.linearRampToValueAtTime(1400,t+0.32);o.frequency.linearRampToValueAtTime(350,t+0.55);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.08);g.gain.linearRampToValueAtTime(0,t+0.55);
  o.start(t);o.stop(t+0.58);
}
function playHomerun(ctx) {
  const t=ctx.currentTime;
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.09,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const src=ctx.createBufferSource();src.buffer=buf;
  const g=ctx.createGain();g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  src.connect(g);g.connect(ctx.destination);src.start(t);
  [[380,0.08],[560,0.18],[720,0.28],[960,0.38]].forEach(([f,delay])=>{
    const o=ctx.createOscillator(),gn=ctx.createGain();
    o.connect(gn);gn.connect(ctx.destination);o.type="sine";o.frequency.value=f;
    gn.gain.setValueAtTime(0,t+delay);gn.gain.linearRampToValueAtTime(0.28,t+delay+0.04);gn.gain.linearRampToValueAtTime(0,t+delay+0.14);
    o.start(t+delay);o.stop(t+delay+0.16);
  });
}
function playExplosion(ctx) {
  const t=ctx.currentTime;
  for(let s=0;s<3;s++){
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.45,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const src=ctx.createBufferSource();src.buffer=buf;
    const g=ctx.createGain();g.gain.setValueAtTime(0.85,t+s*0.15);g.gain.exponentialRampToValueAtTime(0.001,t+s*0.15+0.45);
    const lp=ctx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=180+s*90;
    src.connect(lp);lp.connect(g);g.connect(ctx.destination);src.start(t+s*0.15);
  }
  [750,1100,550,1500].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*0.05);g.gain.linearRampToValueAtTime(0.28,t+i*0.05+0.02);g.gain.linearRampToValueAtTime(0,t+i*0.05+0.1);
    o.start(t+i*0.05);o.stop(t+i*0.05+0.12);
  });
}
const SFX = { gun:playGun, violin:playViolin, plane:playPlane, homerun:playHomerun, explosion:playExplosion };

/* ── 各獎勵登場音效 ────────────────────────────────────────── */
function playRewardEntrance(ctx, sfxKey){
  const t=ctx.currentTime;
  if(sfxKey==="gun"){
    // 大雄：威武號角三響
    [[392,0],[523.25,0.18],[659.25,0.36]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.value=f;
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.4,t+d+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+d+0.16);
      o.start(t+d);o.stop(t+d+0.18);
    });
  } else if(sfxKey==="violin"){
    // 靜香：輕柔鈴聲級聯
    [[1047,0],[1319,0.12],[1568,0.24],[2093,0.36]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=f;
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.3,t+d+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+d+0.35);
      o.start(t+d);o.stop(t+d+0.38);
    });
  } else if(sfxKey==="plane"){
    // 小夫：飛機引擎由遠而近
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type="sawtooth";
    o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(600,t+0.5);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.3);g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    o.start(t);o.stop(t+0.58);
  } else if(sfxKey==="homerun"){
    // 胖虎：歡呼鼓聲三連擊
    for(let i=0;i<3;i++){
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,1.5);
      const src=ctx.createBufferSource();src.buffer=buf;
      const gn=ctx.createGain();gn.gain.setValueAtTime(0.9-i*0.1,t+i*0.14);gn.gain.exponentialRampToValueAtTime(0.001,t+i*0.14+0.06);
      src.connect(gn);gn.connect(ctx.destination);src.start(t+i*0.14);
    }
    // 上揚勝利音
    [[440,0.45],[554,0.55],[659,0.65],[880,0.75]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=f;
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.32,t+d+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.18);
      o.start(t+d);o.stop(t+d+0.2);
    });
  } else if(sfxKey==="explosion"){
    // 哆啦A夢：神聖電子音＋爆炸低頻
    [[220,0],[277,0.08],[330,0.16],[440,0.24],[554,0.32]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.value=f;
      g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.35,t+d+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.12);
      o.start(t+d);o.stop(t+d+0.14);
    });
    // 低頻爆炸
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.3,ctx.sampleRate);
    const dArr=buf.getChannelData(0);
    for(let j=0;j<dArr.length;j++) dArr[j]=(Math.random()*2-1)*Math.pow(1-j/dArr.length,1.2);
    const src=ctx.createBufferSource();src.buffer=buf;
    const gn=ctx.createGain();gn.gain.setValueAtTime(0.9,t+0.45);gn.gain.exponentialRampToValueAtTime(0.001,t+0.75);
    const lp=ctx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=150;
    src.connect(lp);lp.connect(gn);gn.connect(ctx.destination);src.start(t+0.45);
  }
}

function RewardOverlay({reward, onClose, audioRef}){
  const [phase,setPhase]=useState("in");
  const [closing,setClosing]=useState(false);

  useEffect(()=>{
    // 播放登場音效
    try{
      const ctx=getAudioCtx(audioRef);
      playRewardEntrance(ctx, reward.sfx);
    }catch(e){}
  },[]);

  const handleClose=()=>{
    if(closing) return;
    setClosing(true);
    setPhase("out");
    setTimeout(()=>onClose(), 350);
  };

  return(
    <div className="reward-overlay" onClick={handleClose}>
      {[...Array(18)].map((_,i)=>(
        <div key={i} className="firework" style={{
          width:`${16+Math.random()*26}px`,height:`${16+Math.random()*26}px`,

      ))}
      <div className={`reward-card ${phase==="in"?"reward-zoom-in":"reward-zoom-out"}`}
           onClick={e=>e.stopPropagation()}>
        <img src={reward.img} alt={reward.char}
             className={`reward-img ${reward.border}`}/>
        <div className={`text-2xl font-black mt-0.5 ${reward.titleColor}`}>{reward.title}</div>
        <div className="text-base text-slate-600 font-semibold mt-1">{reward.subtitle}</div>
        <div className="text-3xl mt-2 tracking-widest">{reward.stars}</div>
        <button

  );
}

  const handleRewardClose=()=>{ setReward(null); goNext(); };

  const handleAnswer=(option)=>{
    if(feedback||reward) return;
    setSelected(option);
    const q=questions[idx];
    const ok=option===q.answer;
    setFeedback(ok?"correct":"wrong");
    if(ok){
      playCorrect(ac());
      const newScore=score+1; setScore(newScore);
      setShowStars(true); setTimeout(()=>setShowStars(false),900);
      const newCombo=combo+1; setCombo(newCombo);
      const isLast=idx===questions.length-1;
      const allCorrect=isLast&&newScore===questions.length&&wrongList.length===0;
      let rKey=null;
      if(allCorrect) rKey="all";
      else if(newCombo===40) rKey=40;
      else if(newCombo===25) rKey=25;
      else if(newCombo===15) rKey=15;
      else if(newCombo===5)  rKey=5;
      if(rKey!==null){
        const sfxFn=SFX[REWARDS[rKey].sfx];
        setTimeout(()=>{ if(sfxFn) sfxFn(ac()); setReward(REWARDS[rKey]); },320);
      }
    } else {
      playWrong(ac()); setCombo(0); setShakeKey(k=>k+1);
      setWrongList(prev=>{
        if(prev.find(p=>p.sentence===q.sentence)) return prev;
        return [...prev,q];
      });
    }
  };

  const handleNext=()=>{ if(!reward) goNext(); };

  /* ── 開始畫面 ── */
  if(gameState==="start") return(
    <div className="min-h-screen flex flex-col items-center justify-center p-6">
      <div className="bg-white p-10 rounded-3xl shadow-xl max-w-2xl w-full text-center space-y-7">
        <div className="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto text-red-600">
          <IconBookOpen size={48}/>
        </div>
        <h1 className="text-4xl md:text-5xl font-bold text-slate-800 tracking-wider">字音字形挑錯挑戰 v3</h1>
        <p className="text-xl text-slate-500 leading-relaxed">
          紅色的字（或注音）寫錯了！<br/>
          請選出正確的字（或注音）幫它糾錯吧！<br/>
          <span className="text-orange-500 font-bold text-base">連續答對可以解鎖特別獎勵 🎁</span>
        </p>
        <button onClick={()=>startGame(false)}
          className="bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-5 px-12 rounded-full shadow-lg transition-transform active:scale-95 flex items-center justify-center mx-auto">
          <IconPlay className="mr-3" size={32}/> 開始除錯
        </button>
        <div className="grid grid-cols-2 gap-2 text-sm text-slate-500 bg-slate-50 rounded-2xl p-4">
          <div>🎯 連勝 5 題 → 大雄獎勵</div>
          <div>🎻 連勝 15 題 → 靜香獎勵</div>
          <div>✈️ 連勝 25 題 → 小夫獎勵</div>
          <div>⚾ 連勝 40 題 → 胖虎獎勵</div>
          <div className="col-span-2">💣 全部答對 → 哆啦A夢終極獎勵！</div>
        </div>
        <p className="text-slate-400">共 {QUESTION_DATA.length} 題</p>
      </div>
    </div>
  );

  /* ── 結束畫面 ── */
  if(gameState==="end"){
    const total=questions.length;
    const pct=Math.round(score/total*100);
    const tier=pct===100?"💎":pct>=90?"🥇":pct>=75?"🥈":pct>=60?"🥉":"🌟";
    return(
      <div className="min-h-screen flex flex-col items-center justify-center p-6">
        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-3xl w-full text-center space-y-6">
          <div className="text-7xl">{tier}</div>
          <h1 className="text-2xl md:text-3xl font-bold text-slate-800 leading-snug">{encourage}</h1>
          <div className="bg-slate-50 rounded-2xl p-5 space-y-3">
            <div className="text-xl text-slate-600">
              正確題數：<span className="text-5xl font-black text-red-500 mx-2">{score}</span> / {total}
            </div>
            <div className="w-full bg-slate-200 rounded-full h-4 overflow-hidden">
              <div className="bg-gradient-to-r from-red-400 to-orange-400 h-4 rounded-full progress-fill" style={{width:`${pct}%`}}/>
            </div>
            <div className="text-2xl font-bold text-orange-500">得分率 {pct}%</div>
          </div>
          <div className="grid grid-cols-2 gap-4 text-left">
            {["形近字","多音字"].map(type=>{
              const qs=questions.filter(q=>q.type===type);
              const correct=qs.filter(q=>!wrongList.find(w=>w.sentence===q.sentence)).length;
              return(
                <div key={type} className="bg-blue-50 rounded-2xl p-4 border border-blue-100">
                  <div className="font-bold text-blue-700 text-lg mb-1">{type}</div>
                  <div className="text-slate-600">共 {qs.length} 題，答對 <span className="font-black text-blue-600">{correct}</span> 題</div>
                  <div className="text-sm text-slate-400">正確率 {qs.length?Math.round(correct/qs.length*100):0}%</div>
                </div>
              );
            })}
          </div>
          {wrongList.length>0&&(
            <div className="text-left bg-red-50 rounded-2xl p-5 space-y-3">
              <h2 className="text-xl font-bold text-red-600 flex items-center gap-2">
                <IconTarget size={22}/> 需要加強的題目（共 {wrongList.length} 題）
              </h2>
              <div className="space-y-3 max-h-64 overflow-y-auto pr-1">
                {wrongList.map((q,i)=>(
                  <div key={i} className="bg-white rounded-xl p-3 border border-red-200 shadow-sm">
                    <span className="text-xs font-bold text-white bg-red-400 px-2 py-0.5 rounded-full mr-2">{q.type}</span>
                    {q.note&&<span className="text-sm font-bold text-red-500 mr-2">{q.note}</span>}
                    <span className="text-base text-slate-700">
                      {q.sentence.split("{typo}").map((part,j,arr)=>(
                        <Fragment key={j}>{part}
                          {j<arr.length-1&&(
                            <span className="inline-flex items-center justify-center mx-1 px-1.5 rounded-md border-2 border-green-500 bg-green-50 text-green-700 font-bold">{q.answer}</span>
                          )}
                        </Fragment>
                      ))}
                    </span>
                    <div className="text-xs text-slate-400 mt-1">選項：{q.options.join("　")}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>startGame(true)}
                className="mt-2 w-full bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-3 rounded-2xl shadow active:scale-95 flex items-center justify-center gap-2">
                <IconTarget size={24}/> 再練習錯誤題目
              </button>
            </div>
          )}
          <button onClick={()=>startGame(false)}
            className="w-full bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-bold py-4 rounded-full shadow-lg active:scale-95 flex items-center justify-center gap-3">
            <IconRefresh size={26}/> 全部重新挑戰
          </button>
        </div>
      </div>
    );
  }

  /* ── 遊戲畫面 ── */
  const q=questions[idx];
  const isFormNear=q.type==="形近字";
  return(
    <div className="min-h-screen flex flex-col items-center p-4 md:p-6">
      {reward&&<RewardOverlay reward={reward} onClose={handleRewardClose} audioRef={audioRef}/>}

      {/* 頂部列 */}
      <div className="w-full max-w-4xl flex justify-between items-center mb-3 bg-white p-3 md:p-4 rounded-2xl shadow-sm gap-3">
        <div className="text-lg font-bold text-slate-500 shrink-0">
          第 <span className="text-red-500 text-2xl mx-1">{idx+1}</span> / {questions.length} 題
          {reviewMode&&<span className="ml-1 text-xs text-orange-500 font-bold">（複習）</span>}
        </div>
        <ComboDisplay combo={combo}/>
        <div className="text-lg font-bold text-slate-500 bg-red-50 px-3 py-1.5 rounded-xl shrink-0">
          ✅ <span className="text-red-500 text-xl ml-1">{score}</span>
        </div>
      </div>

      {/* 進度條 */}
      <div className="w-full max-w-4xl bg-slate-200 rounded-full h-3 mb-5 overflow-hidden">
        <div className="bg-gradient-to-r from-red-400 to-orange-400 h-3 rounded-full progress-fill"
             style={{width:`${(idx/questions.length)*100}%`}}/>
      </div>

      {/* 題目卡 */}
      <div className="w-full max-w-4xl bg-white p-7 md:p-10 rounded-3xl shadow-lg mb-5 relative overflow-hidden">
        <StarBurst active={showStars}/>
        <div className="absolute -top-4 left-6 bg-red-500 text-white px-5 py-1.5 rounded-full font-bold text-lg shadow border-2 border-white">
          {q.type}糾錯
        </div>
        <div className="mt-5 min-h-[140px] flex flex-col justify-center">
          {q.note&&<div className="text-xl font-bold text-red-500 mb-3">{q.note}</div>}
          <div key={shakeKey} className={`text-2xl md:text-4xl font-medium text-slate-800 leading-relaxed ${feedback==="wrong"?"anim-shake":""}`}>
            {q.sentence.split("{typo}").map((part,i,arr)=>(
              <Fragment key={i}>{part}
                {i<arr.length-1&&(
                  !feedback
                    ? <span className="inline-flex items-center justify-center mx-2 border-b-4 border-slate-400 font-bold text-slate-300 min-w-[2em]">　</span>
                    : feedback==="correct"
                      ? <span className="inline-flex items-center justify-center mx-2 px-2 rounded-lg border-4 border-green-500 bg-green-100 text-green-700 font-bold anim-pop">{q.answer}</span>
                      : <span className="inline-flex items-center justify-center mx-2 px-2 rounded-lg border-4 border-red-500 bg-red-50 text-red-600 font-bold">{q.answer}</span>
                )}
              </Fragment>
            ))}
          </div>
        </div>
      </div>

      {/* 選項 */}
      <div className="w-full max-w-4xl grid gap-4 mb-5"
           style={{gridTemplateColumns:`repeat(auto-fit, minmax(130px, 1fr))`}}>
        {q.options.map((opt,i)=>{
          let cls="bg-white border-4 border-slate-200 text-slate-700 hover:border-red-400 hover:bg-red-50";
          let icon=null,extra="";
          if(feedback){
            if(opt===q.answer){cls="bg-green-100 border-4 border-green-500 text-green-700";icon=<IconCheck className="absolute top-2 right-2 text-green-500" size={24}/>;extra="anim-pop";}
            else if(opt===selected){cls="bg-red-100 border-4 border-red-500 text-red-700 opacity-70";icon=<IconX className="absolute top-2 right-2 text-red-500" size={24}/> ;}
            else{cls="bg-slate-50 border-4 border-slate-200 text-slate-400 opacity-40";}
          }
          return(
            <button key={i} onClick={()=>handleAnswer(opt)} disabled={!!feedback||!!reward}
              className={`relative rounded-3xl p-5 md:p-8 shadow-sm transition-all duration-200 active:scale-95 flex flex-col items-center justify-center gap-1 min-h-[100px] ${cls} ${extra}`}>
              {feedback&&isFormNear&&<span className="text-xs font-bold text-red-400 tracking-wider">{CHAR_ZHUYIN[opt]||""}</span>}
              <span className="text-3xl md:text-5xl font-bold">{opt}</span>
              {icon}
            </button>
          );
        })}
      </div>

      {/* 回饋 */}
      <div className="w-full max-w-4xl flex flex-col items-center gap-3">
        {feedback==="correct"&&<div className="text-xl md:text-2xl font-bold text-green-500 animate-bounce text-center">🎉 答對了！你好厲害！</div>}
        {feedback==="wrong"&&<div className="text-lg md:text-xl font-bold text-red-500 animate-pulse text-center">❌ 哎呀答錯了！正確是「<span className="text-green-600 text-2xl font-black underline mx-1">{q.answer}</span>」喔！</div>}
        {feedback&&!reward&&(
          <button onClick={handleNext}
            className="next-btn mt-1 bg-indigo-500 hover:bg-indigo-600 text-white text-xl font-bold py-4 px-14 rounded-full shadow-lg flex items-center justify-center gap-3">
            {idx<questions.length-1?<><IconArrow size={26}/> 下一題</>:<><IconTrophy size={26}/> 查看結果</>}
          </button>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
