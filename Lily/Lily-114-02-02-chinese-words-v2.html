      font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
    }
    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }
    .anim-pop { animation: pop-in 0.4s ease forwards; }
    .anim-shake { animation: shake 0.5s ease; }
    .ruby-wrap { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; }
    .ruby-text { font-size: 0.38em; letter-spacing: 0.05em; color: #ef4444; font-weight: 600; margin-bottom: 2px; }
    .ruby-char { line-height: 1; }
    .next-btn {
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .next-btn:active { transform: scale(0.96); }
    @keyframes star-fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 1; }

    }
    .star { position: absolute; font-size: 1.8rem; animation: star-fall 0.9s ease forwards; pointer-events: none; }

    // ── 音效（Web Audio API） ────────────────────────────────────
    function playCorrect(ctx) {
      const t = ctx.currentTime;
      [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0, t + i*0.08);
        gain.gain.linearRampToValueAtTime(0.35, t + i*0.08 + 0.04);
        gain.gain.linearRampToValueAtTime(0, t + i*0.08 + 0.18);
        osc.start(t + i*0.08);
        osc.stop(t + i*0.08 + 0.2);
      });
    }

    function playWrong(ctx) {
      const t = ctx.currentTime;
      [220, 196].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = "sawtooth";
        gain.gain.setValueAtTime(0, t + i*0.22);
        gain.gain.linearRampToValueAtTime(0.3, t + i*0.22 + 0.05);
        gain.gain.linearRampToValueAtTime(0, t + i*0.22 + 0.22);
        osc.start(t + i*0.22);
        osc.stop(t + i*0.22 + 0.25);
      });
    }

    function CharWithZhuyin({ char, highlight = false }) {
      const zh = CHAR_ZHUYIN[char];

        <span className="ruby-wrap mx-0.5">
          {zh && <span className="ruby-text">{zh}</span>}
          <span className={`ruby-char ${highlight ? "text-red-500 font-bold" : "text-slate-700"}`}>{char}</span>

    function StarBurst({ active }) {
      if (!active) return null;
      const stars = ["⭐","🌟","✨","💫","🎉","🎊"];
      return (
        <div className="pointer-events-none absolute inset-0 overflow-hidden flex items-center justify-center">
          {[...Array(8)].map((_,i) => (
            <span key={i} className="star" style={{
              left: `${10 + Math.random()*80}%`,
              top: `${10 + Math.random()*60}%`,
              animationDelay: `${Math.random()*0.3}s`
            }}>
              {stars[i % stars.length]}
            </span>
          ))}
        </div>
      );
    }

      };

      const startGame = (fromWrong = false) => {
        const pool = fromWrong ? wrongList : shuffle(QUESTION_DATA);
        setQuestions(pool);
        setCurrentQIndex(0);
        setScore(0);
        setWrongList([]);
        setFeedback(null);
        setSelectedOption(null);
        setShowStars(false);
        setReviewMode(fromWrong);
        setGameState('playing');
      };

      const handleAnswer = (option) => {
        if (feedback) return;
        setSelectedOption(option);
        const q = questions[currentQIndex];
        const isCorrect = option === q.answer;
        setFeedback(isCorrect ? 'correct' : 'wrong');

        const ctx = getCtx();
        if (isCorrect) {
          playCorrect(ctx);
          setShowStars(true);
          setTimeout(() => setShowStars(false), 1000);
        } else {
          playWrong(ctx);
          setShakeKey(k => k + 1);
          setWrongList(prev => {
            if (prev.find(p => p.sentence === q.sentence)) return prev;
            return [...prev, q];
          });
        }
      };

      const handleNext = () => {
        if (currentQIndex < questions.length - 1) {
          setCurrentQIndex(prev => prev + 1);
          setFeedback(null);
          setSelectedOption(null);
          setShowStars(false);
        } else {
          setGameState('end');
        }
      };

      // ── 開始畫面 ─────────────────────────────────────────────
      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6">
            <div className="bg-white p-10 rounded-3xl shadow-xl max-w-2xl w-full text-center space-y-8">
              <div className="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto text-red-600">
                <IconBookOpen size={48} />
              </div>
              <h1 className="text-4xl md:text-5xl font-bold text-slate-800 tracking-wider">字音字形挑錯挑戰</h1>
              <p className="text-xl text-slate-500 leading-relaxed">
                紅色的字（或注音）寫錯了！<br/>
                請在下方選出正確的字（或注音）來幫它糾錯吧！
              </p>
              <button
                onClick={() => startGame(false)}
                className="bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-5 px-12 rounded-full shadow-lg transition-transform transform active:scale-95 flex items-center justify-center mx-auto"
              >
                <IconPlay className="mr-3" size={32} /> 開始除錯
              </button>
              <p className="text-slate-400">共 {QUESTION_DATA.length} 題</p>
            </div>
          </div>
        );
      }

      // ── 結束畫面 ─────────────────────────────────────────────
      if (gameState === 'end') {
        const total = questions.length;
        const pct = Math.round((score / total) * 100);
        let message = "神乎其技！你是除錯大師！🏆";
        if (pct < 60)  message = "再接再厲，多練習就會更棒！💪";
        else if (pct < 90) message = "非常優秀！大部分的錯字都被你揪出來了！🎉";

        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6">
            <div className="bg-white p-10 rounded-3xl shadow-xl max-w-3xl w-full text-center space-y-8">
              <div className="w-32 h-32 bg-yellow-100 rounded-full flex items-center justify-center mx-auto text-yellow-500">
                <IconTrophy size={64} />
              </div>
              <h1 className="text-3xl md:text-4xl font-bold text-slate-800">{message}</h1>
              <div className="text-2xl text-slate-600">
                正確題數：<span className="text-5xl font-bold text-red-500 mx-2">{score}</span> / {total}
              </div>

              {/* 錯誤統計 */}
              {wrongList.length > 0 && (
                <div className="text-left bg-red-50 rounded-2xl p-6 space-y-4">
                  <h2 className="text-2xl font-bold text-red-600 flex items-center gap-2">
                    <IconTarget size={26}/> 需要加強的題目（共 {wrongList.length} 題）
                  </h2>
                  <div className="space-y-3 max-h-72 overflow-y-auto pr-2">
                    {wrongList.map((q, i) => (
                      <div key={i} className="bg-white rounded-xl p-4 border border-red-200 shadow-sm">
                        <span className="text-xs font-bold text-white bg-red-400 px-2 py-0.5 rounded-full mr-2">{q.type}</span>
                        {q.note && <span className="text-sm font-bold text-red-500 mr-2">{q.note}</span>}
                        <span className="text-lg text-slate-700">
                          {q.sentence.split('{typo}').map((part, j, arr) => (
                            <Fragment key={j}>
                              {part}
                              {j < arr.length - 1 && (
                                <span className="inline-flex items-center justify-center mx-1 px-2 rounded-lg border-2 border-green-500 bg-green-50 text-green-700 font-bold text-base">
                                  {q.answer}
                                </span>
                              )}
                            </Fragment>
                          ))}
                        </span>
                      </div>
                    ))}
                  </div>
                  <button
                    onClick={() => startGame(true)}
                    className="mt-4 w-full bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-2xl shadow transition-transform active:scale-95 flex items-center justify-center gap-3"
                  >
                    <IconTarget size={28} /> 再練習錯誤題目
                  </button>
                </div>
              )}

              <div className="flex flex-col sm:flex-row gap-4 justify-center">
                <button
                  onClick={() => startGame(false)}
                  className="bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-bold py-4 px-10 rounded-full shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3"
                >
                  <IconRefresh size={28} /> 全部重新挑戰
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── 遊戲畫面 ─────────────────────────────────────────────
      const q = questions[currentQIndex];
      const isFormNear = q.type === "形近字";

      return (
        <div className="min-h-screen flex flex-col items-center p-4 md:p-8">

          {/* 頂部進度 */}
          <div className="w-full max-w-4xl flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm">
            <div className="text-xl font-bold text-slate-500">
              第 <span className="text-red-500 text-3xl mx-1">{currentQIndex + 1}</span> / {questions.length} 題
              {reviewMode && <span className="ml-2 text-sm text-orange-500 font-bold">（錯誤複習模式）</span>}
            </div>
            <div className="text-xl font-bold text-slate-500 bg-red-50 px-4 py-2 rounded-xl">
              除錯分 <span className="text-red-500 text-2xl ml-1">{score}</span>
            </div>
          </div>

          {/* 進度條 */}
          <div className="w-full max-w-4xl bg-slate-200 rounded-full h-3 mb-8 overflow-hidden">
            <div
              className="bg-red-500 h-3 rounded-full transition-all duration-300"
              style={{ width:`${(currentQIndex / questions.length) * 100}%` }}
            />
          </div>

          {/* 題目卡 */}
          <div className="w-full max-w-4xl bg-white p-8 md:p-12 rounded-3xl shadow-lg mb-6 relative overflow-hidden">
            <StarBurst active={showStars} />
            <div className="absolute -top-5 left-8 bg-red-500 text-white px-6 py-2 rounded-full font-bold text-xl shadow-md border-2 border-white">
              {q.type}糾錯
            </div>
            <div className="mt-6 min-h-[160px] flex flex-col justify-center">
              {q.note && <div className="text-2xl font-bold text-red-500 mb-4">{q.note}</div>}
              <div
                key={shakeKey}
                className={`text-3xl md:text-5xl font-medium text-slate-800 leading-relaxed md:leading-normal ${feedback === 'wrong' ? 'anim-shake' : ''}`}
              >
                {q.sentence.split('{typo}').map((part, idx, arr) => (
                  <Fragment key={idx}>
                    {part}
                    {idx < arr.length - 1 && (
                      !feedback ? (
                        /* 未作答：顯示空白格 */
                        <span className="inline-flex items-center justify-center mx-2 border-b-4 border-slate-500 font-bold text-slate-400"
                          style={{ minWidth: '2em', minHeight: '1.2em' }}>
                          　
                        </span>
                      ) : feedback === 'correct' ? (
                        /* 答對：格子填入正確答案，綠色 */
                        <span className="inline-flex items-center justify-center mx-2 px-2 rounded-lg border-4 border-green-500 bg-green-100 text-green-700 font-bold anim-pop transition-all duration-300">
                          {q.answer}
                        </span>
                      ) : (
                        /* 答錯：格子填入正確答案，紅色外框提示 */
                        <span className="inline-flex items-center justify-center mx-2 px-2 rounded-lg border-4 border-red-500 bg-red-50 text-red-600 font-bold transition-all duration-300">
                          {q.answer}
                        </span>
                      )
                    )}
                  </Fragment>
                ))}
              </div>
            </div>
          </div>

          {/* 選項區 */}
          <div
            className="w-full max-w-4xl grid gap-5 mb-6"
            style={{ gridTemplateColumns:`repeat(auto-fit, minmax(140px, 1fr))` }}
          >
            {q.options.map((option, idx) => {
              let btnClass = "bg-white border-4 border-slate-200 text-slate-700 hover:border-red-400 hover:bg-red-50";
              let icon = null;
              let extraClass = "";

              if (feedback) {
                if (option === q.answer) {
                  btnClass = "bg-green-100 border-4 border-green-500 text-green-700";
                  icon = <IconCheck className="absolute top-3 right-3 text-green-500" size={28}/>;
                  extraClass = "anim-pop";
                } else if (option === selectedOption) {
                  btnClass = "bg-red-100 border-4 border-red-500 text-red-700 opacity-70";
                  icon = <IconX className="absolute top-3 right-3 text-red-500" size={28}/>;
                } else {
                  btnClass = "bg-slate-50 border-4 border-slate-200 text-slate-400 opacity-40";
                }
              }

              return (
                <button
                  key={idx}
                  onClick={() => handleAnswer(option)}
                  disabled={!!feedback}
                  className={`relative rounded-3xl p-6 md:p-10 shadow-sm transition-all duration-200 transform active:scale-95 flex flex-col items-center justify-center gap-1 min-h-[110px] ${btnClass} ${extraClass}`}
                >
                  {/* 答題後顯示注音 */}
                  {feedback && isFormNear && (
                    <span className="text-sm font-bold text-red-400 tracking-wider">{CHAR_ZHUYIN[option] || ""}</span>
                  )}
                  <span className="text-4xl md:text-6xl font-bold">{option}</span>
                  {icon}
                </button>
              );
            })}
          </div>

          {/* 回饋 + 下一題 */}
          <div className="w-full max-w-4xl flex flex-col items-center gap-4">
            {feedback === 'correct' && (
              <div className="text-2xl md:text-3xl font-bold text-green-500 animate-bounce text-center">
                🎉 太厲害了！成功改正錯別字！
              </div>
            )}
            {feedback === 'wrong' && (
              <div className="text-xl md:text-2xl font-bold text-red-500 animate-pulse text-center">
                ❌ 答錯囉！正確的是「<span className="text-green-600 text-3xl font-bold underline mx-1">{q.answer}</span>」喔！
              </div>
            )}

            {feedback && (
              <button
                onClick={handleNext}
                className="next-btn mt-2 bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white text-2xl font-bold py-4 px-16 rounded-full shadow-lg flex items-center justify-center gap-3"
              >
                {currentQIndex < questions.length - 1 ? (
                  <><IconArrow size={28}/> 下一題</>
                ) : (
                  <><IconTrophy size={28}/> 查看結果</>
                )}
              </button>
            )}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
