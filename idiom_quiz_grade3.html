    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4;
        }
        .option-btn {
            transition: transform 0.1s, background-color 0.15s, border-color 0.15s;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.99);
        }
        .correct-flash {
            animation: correctPulse 0.4s ease-out;
        }
        @keyframes correctPulse {
            0%   { background-color: #d1fae5; }
            50%  { background-color: #6ee7b7; }
            100% { background-color: #d1fae5; }
        }
        .progress-fill {
            background: linear-gradient(90deg, #10b981, #059669);
            transition: width 0.4s ease;
        }
        .star-burst {
            animation: starPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes starPop {
            0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
            70%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .fade-in {
            animation: fadeUp 0.3s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .shake {
            animation: shake 0.35s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }
        #auto-advance-bar-fill {
            animation: shrink 0.5s linear forwards;
        }
        @keyframes shrink {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>

    <!-- ===== 音效 ===== -->
    <script>
        let isMuted = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                const now = audioCtx.currentTime;
                osc.type = 'sine';
                osc.frequency.setValueAtTime(659.25, now);
                gain.gain.setValueAtTime(0.3, now);
                osc.frequency.setValueAtTime(880.00, now + 0.12);
                gain.gain.setValueAtTime(0.3, now + 0.12);
                osc.start(now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                const now = audioCtx.currentTime;
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.35);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
        }
    </script>

                explanation: "雙方力量相當，不分上下。",
                example: "運動會拔河決賽，兩班人馬勢均力敵，僵持了三分鐘都還沒有分出勝負。",
                sentence: "期末大地遊戲最後一關是班際猜謎PK，三年甲班和三年乙班一路{BLANK}，一直到最後一題才分出高下，全場都緊張得屏住呼吸。"
            },
            {
                idiom: "光怪陸離",
                pronunciation: "ㄍㄨㄤ ㄍㄨㄞˋ ㄌㄨˋ ㄌㄧˊ",
                explanation: "形容景象奇奇怪怪，各種顏色和事物混雜在一起。",
                example: "元宵節燈會的會場上，各式各樣的花燈讓整條街呈現出光怪陸離的夢幻景象。",
                sentence: "班上辦萬聖節同樂會，教室裡有穿蝙蝠裝的、戴南瓜頭的、扮殭屍的，加上滿牆的蜘蛛網彩帶，整間教室呈現{BLANK}的熱鬧景象，大家笑得合不攏嘴。"
            },
            {
                idiom: "初出茅廬",
                pronunciation: "ㄔㄨ ㄔㄨ ㄇㄠˊ ㄌㄨˊ",
                explanation: "比喻剛剛開始做某事，經驗還不足的新手。",
                example: "這位初出茅廬的小廚師第一次上台做料理，雖然緊張，但做出來的蛋炒飯意外地好吃。",
                sentence: "學校電視台找了幾位{BLANK}的同學來擔任小小主播，第一次上鏡頭時大家都有點緊張，但播出後全校同學都給了熱烈掌聲。"
            },
            {
                idiom: "投機取巧",
                pronunciation: "ㄊㄡˊ ㄐㄧ ㄑㄩˇ ㄑㄧㄠˇ",
                explanation: "不認真努力，只想用小聰明或漏洞來得到好處。",
                example: "讀書不能投機取巧，靠猜答案通過考試，以後遇到真正的難題還是不會。",
                sentence: "跳繩計數比賽，小強趁計數員回頭時多報了幾下，這種{BLANK}的行為被同學看到，大家都覺得他這樣贏得不光彩。"
            },
            {
                idiom: "禮尚往來",
                pronunciation: "ㄌㄧˇ ㄕㄤˋ ㄨㄤˇ ㄌㄞˊ",
                explanation: "對方以禮待你，你也要以禮回報，互相尊重。",
                example: "隔壁班送來感謝卡，我們班也準備了親手畫的圖卡回禮，這就是禮尚往來的精神。",
                sentence: "上次三年甲班借了我們班的踢毽子，這次他們舉辦班級生日會邀請我們一起慶祝，老師說這就是{BLANK}，我們也要準備一份小禮物帶過去。"
            },
            {
                idiom: "耳濡目染",
                pronunciation: "ㄦˇ ㄖㄨˊ ㄇㄨˋ ㄖㄢˇ",
                explanation: "長期聽到、看到，在不知不覺中受到影響。",
                example: "阿嬤每天在廚房煮飯，小惠從小耳濡目染，長大後做起菜來有模有樣。",
                sentence: "小凱的爸爸是社區管弦樂團的小提琴手，小凱從小{BLANK}，還沒上音樂課就已經能哼出幾首古典樂的旋律，學起樂器來特別快。"
            }
        ];

        /* ---- 取干擾選項 ---- */
        function getRandomOptions(correctIdiom, count = 3) {
            const others = idiomsData.filter(i => i.idiom !== correctIdiom);
            return others.sort(() => 0.5 - Math.random()).slice(0, count).map(i => i.idiom);
        }

        /* ---- 狀態變數 ---- */
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let correctAnswersCount = 0;
        let wrongNotes = [];
        let answered = false;     // 防止重複點選
        let autoAdvanceTimer = null;

        /* ---- 開始 ---- */
        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            score = 0;
            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            wrongNotes = [];
            answered = false;
            document.getElementById('score-display').innerText = '目前分數：0 分';
            quizQuestions = [...idiomsData].sort(() => 0.5 - Math.random());
            showQuestion();
        }

        /* ---- 顯示題目 ---- */
        function showQuestion() {
            answered = false;
            clearTimeout(autoAdvanceTimer);

            document.getElementById('feedback-panel').classList.add('hidden');
            document.getElementById('auto-advance-notice').classList.add('hidden');

            const currentQ = quizQuestions[currentQuestionIndex];

            // 進度
            const pct = (currentQuestionIndex / quizQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('question-number').innerText = `第 ${currentQuestionIndex + 1} / ${quizQuestions.length} 題`;

            // 空格 HTML
            const blankHTML = `<span class="inline-flex items-center gap-0.5 mx-1 border-b-4 border-emerald-500 px-2 py-0.5 bg-yellow-50 rounded-md text-emerald-700 font-extrabold tracking-widest">（&ensp;&ensp;&ensp;&ensp;）</span>`;
            const formattedSentence = currentQ.sentence.replace('{BLANK}', blankHTML);

            const qTextEl = document.getElementById('question-text');
            qTextEl.innerHTML = `
                <div class="bg-emerald-50 text-emerald-800 px-3 py-1.5 rounded-lg inline-block text-sm font-bold mb-3 shadow-sm border border-emerald-100">✏️ 請選出空格處正確的成語：</div>
                <p class="mt-1 leading-relaxed text-gray-800" id="sentence-p">${formattedSentence}</p>
            `;
            qTextEl.style.fontSize = `${currentFontSize + 2}px`;

            // 選項
            const distractors = getRandomOptions(currentQ.idiom);
            const options = [currentQ.idiom, ...distractors].sort(() => 0.5 - Math.random());
            const labels = ['A', 'B', 'C', 'D'];
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-gray-50 hover:bg-emerald-50 border-2 border-gray-200 hover:border-emerald-400 rounded-xl p-4 flex items-center gap-4 font-bold shadow-sm focus:outline-none focus:ring-4 focus:ring-emerald-200";
                btn.style.fontSize = `${currentFontSize}px`;
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold text-sm shrink-0">${labels[idx]}</span>
                    <span class="text-gray-800">${opt}</span>
                `;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        /* ---- 檢查答案 ---- */
        function checkAnswer(selectedAnswer, clickedButton) {
            if (answered) return;
            answered = true;

            const currentQ = quizQuestions[currentQuestionIndex];
            const optionBtns = document.querySelectorAll('.option-btn');
            optionBtns.forEach(btn => { btn.disabled = true; });

            const isCorrect = (selectedAnswer === currentQ.idiom);

            // 把題目空格填入正確答案
            const completeHTML = `<span class="inline-flex items-center mx-1 border-b-4 border-emerald-600 px-2 py-0.5 bg-emerald-50 rounded-md text-emerald-800 font-extrabold tracking-widest">（${currentQ.idiom}）</span>`;
            const sentenceP = document.getElementById('sentence-p');
            if (sentenceP) sentenceP.innerHTML = currentQ.sentence.replace('{BLANK}', completeHTML);

            if (isCorrect) {
                score += 5;
                correctAnswersCount++;
                document.getElementById('score-display').innerText = `目前分數：${score} 分`;

                clickedButton.classList.remove('bg-gray-50', 'border-gray-200', 'hover:bg-emerald-50');
                clickedButton.classList.add('bg-emerald-100', 'border-emerald-500', 'correct-flash');

                playSound('correct');

                // 顯示自動跳題提示條，0.5 秒後跳下一題
                const notice = document.getElementById('auto-advance-notice');
                notice.classList.remove('hidden');
                // 重置動畫
                const bar = document.getElementById('auto-advance-bar-fill');
                bar.style.animation = 'none';
                bar.offsetHeight; // reflow
                bar.style.animation = '';

                autoAdvanceTimer = setTimeout(() => {
                    notice.classList.add('hidden');
                    nextQuestion();
                }, 500);

            } else {
                // 標記錯誤選項
                clickedButton.classList.remove('bg-gray-50', 'border-gray-200');
                clickedButton.classList.add('bg-red-100', 'border-red-400', 'shake');

                // 標示正確選項
                optionBtns.forEach(btn => {
                    const label = btn.querySelector('span:last-child');
                    if (label && label.innerText === currentQ.idiom) {
                        btn.classList.add('bg-emerald-50', 'border-emerald-400');
                    }
                });

                // 加入錯題筆記
                wrongNotes.push({
                    idiom: currentQ.idiom,
                    pronunciation: currentQ.pronunciation,
                    explanation: currentQ.explanation,
                    example: currentQ.example,
                    sentence: currentQ.sentence,
                    userAnswer: selectedAnswer
                });

                playSound('wrong');

                // 顯示詳細反饋面板
                const idiomExplanation = document.getElementById('idiom-explanation');
                idiomExplanation.innerHTML = `
                    <div class="flex flex-wrap gap-2 items-center mb-2">
                        <span class="text-2xl font-bold text-orange-600">${currentQ.idiom}</span>
                        <span class="text-xs text-gray-500 bg-orange-100 px-2 py-0.5 rounded-full font-bold">${currentQ.pronunciation}</span>
                    </div>
                    <p><strong class="text-orange-800">【成語意思】：</strong>${currentQ.explanation}</p>
                    <p class="italic text-gray-600"><strong class="text-orange-800">【造句範例】：</strong>${currentQ.example}</p>
                `;
                idiomExplanation.style.fontSize = `${currentFontSize}px`;

                const feedbackBox = document.getElementById('feedback-box');
                feedbackBox.className = "rounded-xl p-5 text-white mb-4 flex flex-col md:flex-row items-center justify-between gap-4 bg-gradient-to-r from-red-500 to-orange-500 shadow-md";
                document.getElementById('feedback-icon').innerText = '😢';
                document.getElementById('feedback-title').innerText = '答錯了！加油，再想想！';
                document.getElementById('correct-answer-show').innerText = `正確答案是【${currentQ.idiom}】，記下來吧！`;

                document.getElementById('feedback-panel').classList.remove('hidden');
                document.getElementById('feedback-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        /* ---- 下一題 ---- */
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) {
                showQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResult();
            }
        }

        /* ---- 顯示結果 ---- */
        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            document.getElementById('correct-count').innerText = correctAnswersCount;
            document.getElementById('final-score').innerText = `${score} 分`;

            // 評語
            const pct = correctAnswersCount / 20;
            let trophy = '🏆', comment = '';
            if (pct === 1)        { trophy = '🏆🌟'; comment = '完美！全部答對，你是成語超人！'; }
            else if (pct >= 0.85) { trophy = '🥇'; comment = '非常優秀！只差一點就滿分囉！'; }
            else if (pct >= 0.7)  { trophy = '🥈'; comment = '表現很好！繼續加油，會更棒的！'; }
            else if (pct >= 0.5)  { trophy = '🥉'; comment = '已經過半了，多複習一定能進步！'; }
            else                  { trophy = '📚'; comment = '繼續練習，成語功力很快就會提升！'; }
            document.getElementById('result-trophy').innerText = trophy;
            document.getElementById('result-comment').innerText = `${comment}（答對 ${correctAnswersCount} / 20 題）`;

            // 錯題筆記
            const notebookList = document.getElementById('notebook-list');
            const notebookEmpty = document.getElementById('notebook-empty');
            notebookList.innerHTML = '';

            if (wrongNotes.length === 0) {
                notebookEmpty.classList.remove('hidden');
            } else {
                notebookEmpty.classList.add('hidden');
                wrongNotes.forEach((note, idx) => {
                    const wrongHTML = `<span class="text-red-600 font-extrabold border-b-2 border-red-400 mx-1">（${note.userAnswer}）</span>`;
                    const rightHTML = `<span class="text-emerald-700 font-extrabold border-b-2 border-emerald-400 mx-1">（${note.idiom}）</span>`;
                    const wrongSentence = note.sentence.replace('{BLANK}', wrongHTML);
                    const rightSentence = note.sentence.replace('{BLANK}', rightHTML);

                    const card = document.createElement('div');
                    card.className = "bg-red-50 rounded-xl p-5 border-l-4 border-red-400 shadow-sm space-y-2";
                    card.innerHTML = `
                        <div class="flex flex-wrap items-center justify-between gap-1 border-b border-red-100 pb-2">
                            <span class="font-bold text-red-700">💡 第 ${idx + 1} 個錯誤：【${note.idiom}】</span>
                            <span class="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold">${note.pronunciation}</span>
                        </div>
                        <div class="notebook-item-text space-y-1 text-gray-700">
                            <div class="bg-white p-3 rounded border border-gray-100 leading-relaxed space-y-1 text-sm">
                                <p><strong class="text-red-500">❌ 你選的：</strong>${wrongSentence}</p>
                                <p><strong class="text-emerald-600">⭕ 正確的：</strong>${rightSentence}</p>
                            </div>
                            <p><strong class="text-red-700">【成語意思】：</strong>${note.explanation}</p>
                            <p class="italic text-gray-600"><strong class="text-red-700">【造句參考】：</strong>${note.example}</p>
                        </div>
                    `;
                    notebookList.appendChild(card);
                });
                applyFontSize();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartQuiz() {
            startQuiz();
        }
    </script>
</body>
</html>
